<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sarcomere 3D Contraction</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
<style>
body { margin:0; overflow:hidden; background:#0f172a; }
</style>
</head>
<body>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,5,20);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);

// LIGHT
const light1 = new THREE.PointLight(0xffffff,1);
light1.position.set(10,20,10);
scene.add(light1);

// ====== Z LINES ======
const zMaterial = new THREE.MeshPhongMaterial({color:0xffd700});
const zGeometry = new THREE.BoxGeometry(0.5,6,6);

const zLeft = new THREE.Mesh(zGeometry, zMaterial);
const zRight = new THREE.Mesh(zGeometry, zMaterial);

zLeft.position.x = -8;
zRight.position.x = 8;

scene.add(zLeft);
scene.add(zRight);

// ====== MYOSIN (THICK FILAMENT) ======
const myosinGeometry = new THREE.CylinderGeometry(0.8,0.8,10,32);
const myosinMaterial = new THREE.MeshPhongMaterial({color:0x3366ff});
const myosin = new THREE.Mesh(myosinGeometry, myosinMaterial);
myosin.rotation.z = Math.PI/2;
scene.add(myosin);

// ====== ACTIN (THIN FILAMENTS) ======
const actinMaterial = new THREE.MeshPhongMaterial({color:0xff3333});
const actins = [];

for(let i=-2;i<=2;i+=2){
  const actinGeometry = new THREE.CylinderGeometry(0.3,0.3,6,16);
  const actinLeft = new THREE.Mesh(actinGeometry, actinMaterial);
  const actinRight = new THREE.Mesh(actinGeometry, actinMaterial);

  actinLeft.rotation.z = Math.PI/2;
  actinRight.rotation.z = Math.PI/2;

  actinLeft.position.set(-5,i,0);
  actinRight.position.set(5,i,0);

  actins.push(actinLeft, actinRight);
  scene.add(actinLeft);
  scene.add(actinRight);
}

// ====== CONTRACTION ANIMATION ======
let direction = -1;

function animate(){
  requestAnimationFrame(animate);

  // Z lines move
  zLeft.position.x += 0.03 * direction;
  zRight.position.x -= 0.03 * direction;

  // Actin slide toward center
  actins.forEach(a=>{
    if(a.position.x < 0) a.position.x += 0.05 * direction;
    if(a.position.x > 0) a.position.x -= 0.05 * direction;
  });

  if(zRight.position.x <= 5 || zRight.position.x >= 8){
    direction *= -1;
  }

  controls.update();
  renderer.render(scene,camera);
}

animate();

window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
